                                        for (const file of this.selectedFiles) {
                                            const testData = { files: [file] };
                                            if (navigator.canShare(testData)) {
                                                shareableFiles.push(file);
                                            }
                                        }
                                        
                                        if (shareableFiles.length > 0) {
                                            shareData.files = shareableFiles;
                                            console.log('Sharing subset of files:', shareableFiles.length);
                                        } else {
                                            console.log('No shareable files found');
                                        }
                                    }
                                } catch (fileError) {
                                    console.error('Error preparing files for sharing:', fileError);
                                    // Continue with basic sharing without files
                                }
                            }
                            
                            // Perform the actual sharing
                            try {
                                await navigator.share(shareData);
                                console.log('Content shared successfully');
                            } catch (shareError) {
                                console.error('Initial share attempt failed:', shareError);
                                
                                // If sharing failed and we didn't use the Android approach already
                                if (shareData.files && !this.isAndroid() && this.generatedCaption) {
                                    try {
                                        // Try again with just text, respecting iOS URL preference
                                        const enhancedText = `${this.generatedCaption}\n\nShared via ImaKOL${!this.isIOS() ? ': ' + window.location.href : ''}`;
                                        
                                        const retryShareData = {
                                            title: 'Check out my post on ImaKOL',
                                            text: enhancedText
                                        };
                                        
                                        // Only add URL for non-iOS
                                        if (!this.isIOS()) {
                                            retryShareData.url = window.location.href;
                                        }
                                        
                                        await navigator.share(retryShareData);
                                        
                                        console.log('Shared with enhanced text format');
                                    } catch (textShareError) {
                                        throw shareError; // Re-throw the original error for error handling below
                                    }
                                } else {
                                    throw shareError;
                                }
                            }
                        } else if (navigator.clipboard) {
                            // Fallback to clipboard
                            const clipboardText = this.generatedCaption 
                                ? `${this.generatedCaption}\n\nShared via ImaKOL: ${window.location.href}`
                                : window.location.href;
                            
                            await navigator.clipboard.writeText(clipboardText);
                            alert('Sharing is not supported on this browser. The caption and a link to your post have been copied to your clipboard.');
                            
                            // Offer to download image
                            if (this.selectedFiles.length > 0 && confirm('Would you like to download your media?')) {
                                this.downloadMedia();
                            }
                        } else {
                            alert('Sharing is not supported on this browser.');
                        }
                    } catch (error) {
                        console.error('Error sharing:', error);
                        
                        if (error.name === 'AbortError') {
                            // User cancelled the share operation
                            console.log('Share operation cancelled by user');
                        } else if (error.name === 'NotAllowedError') {
                            alert('Permission to share was denied');
                        } else {
                            alert('Could not share your post. You may need to save the media files manually.');
                            
                            // Offer to download the media files
                            if (confirm('Would you like to download your media files?')) {
                                this.downloadMedia();
                            }
                        }
                    }
                },
                
                // Add method to download media files directly
                downloadMedia() {
                    if (this.selectedFiles.length === 0) {
                        alert('No media files to download');
                        return;
                    }
                    
                    this.selectedFiles.forEach((file, index) => {
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(file);
                        link.download = file.name || `imakol-media-${index + 1}.${file.name.split('.').pop() || 'jpg'}`;
                        document.body.appendChild(link);
                        link.click();
                        
                        setTimeout(() => {
                            URL.revokeObjectURL(link.href);
                            document.body.removeChild(link);
                        }, 100);
                    });
                },
                
                async enhanceImages() {
                    try {
                        // Check if we have an API key
                        const apiKey = window.ENV?.DEEP_IMAGE_API_KEY;
                        
                        if (!apiKey) {
                            console.error('Deep Image API key not found in environment variables');
                            this.enhancementError = 'API key not found. Please check console for more details.';
                            return;
                        }
                        
                        // Set enhancement in progress
                        this.enhancementInProgress = true;
                        this.enhancementError = null;
                        
                        // Filter for image files only
                        const imageFiles = this.selectedFiles.filter(file => file.type.includes('image'));
                        
                        if (imageFiles.length === 0) {
                            this.enhancementError = 'No images found to enhance.';
                            this.enhancementInProgress = false;
                            return;
                        }
                        
                        // Show detailed progress message
                        this.enhancementError = `Enhancing ${imageFiles.length} image${imageFiles.length > 1 ? 's' : ''}... Please wait.`;
                        
                        // Process each image file
                        for (let i = 0; i < imageFiles.length; i++) {
                            const file = imageFiles[i];
                            const fileName = file.name;
                            
                            // Update progress
                            this.enhancementError = `Enhancing image ${i + 1} of ${imageFiles.length}...`;
                            
                            try {
                                // Convert image to base64
                                const base64Data = await this.fileToBase64(file);
                                if (!base64Data) {
                                    console.error(`Failed to convert image to base64: ${fileName}`);
                                    continue;
                                }
                                
                                // Call Deep Image API to enhance the image
                                const enhancedImage = await this.callDeepImageAPI(base64Data, file);
                                
                                if (enhancedImage) {
                                    // Store enhanced version in our map
                                    this.enhancedImages[fileName] = enhancedImage;
                                    console.log(`Successfully enhanced image: ${fileName}`);
                                }
                            } catch (error) {
                                console.error(`Error enhancing image ${fileName}:`, error);
                            }
                        }
                        
                        // Check results and set success/failure message
                        const successCount = Object.keys(this.enhancedImages).length;
                        if (successCount === 0) {
                            this.enhancementError = 'Failed to enhance any images. Please check console for errors.';
                        } else if (successCount < imageFiles.length) {
                            this.enhancementError = `Enhanced ${successCount} of ${imageFiles.length} images. Some images could not be enhanced.`;
                        } else {
                            this.enhancementError = `Successfully enhanced all ${imageFiles.length} image${imageFiles.length > 1 ? 's' : ''}!`;
                        }
                        
                        // Set the first enhanced image as the comparison image if available
                        if (Object.keys(this.enhancedImages).length > 0) {
                            const firstEnhancedFileName = Object.keys(this.enhancedImages)[0];
                            this.comparisonImageIndex = this.selectedFiles.findIndex(
                                file => file.name === firstEnhancedFileName
                            );
                            this.showEnhancementComparison = true;
                        }
                    } catch (error) {
                        console.error('Error in enhanceImages function:', error);
                        this.enhancementError = error.message || 'An unknown error occurred.';
                    } finally {
                        this.enhancementInProgress = false;
                    }
                },
                
                async fileToBase64(file) {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = () => {
                            // Get just the base64 data without the prefix
                            const base64 = reader.result.split(',')[1];
                            resolve(base64);
                        };
                        reader.onerror = error => reject(error);
                    });
                },
                
                async callDeepImageAPI(imageBase64, originalFile) {
                    try {
                        const apiKey = window.ENV.DEEP_IMAGE_API_KEY;
                        console.log('Starting image enhancement with Deep Image API', {
                            apiKey: apiKey ? `${apiKey.substring(0, 8)}...` : 'missing', 
                            fileName: originalFile.name,
                            fileType: originalFile.type,
                            fileSize: originalFile.size
                        });
                        
                        // Create a blob from the base64 data
                        const base64WithPrefix = `data:${originalFile.type};base64,${imageBase64}`;
                        const fetchResponse = await fetch(base64WithPrefix);
                        const blob = await fetchResponse.blob();
                        
                        // Prepare the auto_enhance preset with all enhancement parameters
                        const enhancementParams = {
                            max_length: 4096,
                            enhancements: [
                                "denoise",
                                "face_enhance",
                                "deblur",
                                "color",
                                "light",
                                "white_balance",
                                "exposure_correction"
                            ],
                            light_parameters: {
                                type: "hdr_light_advanced",
                                level: 1
                            },
                            color_parameters: {
                                type: "contrast",
                                level: 0.5
                            },
                            white_balance_parameters: {
                                level: 0.25
                            },
                            deblur_parameters: {
                                type: "v2"
                            },
                            denoise_parameters: {
                                type: "v2"
                            },
                            output_format: "jpg"
                        };
                        
                        // Create FormData and append the image file
                        const formData = new FormData();
                        formData.append('image', blob, originalFile.name);
                        
                        // Append the enhancement parameters as a JSON string
                        const paramsJson = JSON.stringify(enhancementParams);
                        formData.append('params', new Blob([paramsJson], { type: 'application/json' }));
                        
                        console.log('Sending API request to Deep Image...', {
                            endpoint: 'https://deep-image.ai/api/v1/process',
                            enhancementParams
                        });
                        
                        // Make API request to the correct endpoint
                        const response = await fetch('https://deep-image.ai/api/v1/process', {
                            method: 'POST',
                            headers: {
                                "X-API-KEY": apiKey
                            },
                            body: formData
                        });
                        
                        console.log('API response status:', response.status, response.statusText);
                        
                        if (!response.ok) {
                            const errorText = await response.text();
                            console.error(`API request failed with status ${response.status}:`, errorText);
                            throw new Error(`API request failed with status ${response.status}: ${errorText}`);
                        }
                        
                        // Get enhanced image directly as blob
                        const enhancedBlob = await response.blob();
                        console.log('Enhanced image blob received:', {
                            size: enhancedBlob.size,
                            type: enhancedBlob.type
                        });
                        
                        // Create a new File object with the enhanced image data
                        const enhancedFileName = `enhanced_${originalFile.name}`;
                        const enhancedFile = new File([enhancedBlob], enhancedFileName, { 
                            type: "image/jpeg", 
                            lastModified: new Date().getTime() 
                        });
                        
                        console.log('Enhancement successful, created file:', enhancedFileName);
                        return enhancedFile;
                        
                    } catch (error) {
                        console.error('Error in image enhancement:', error);
                        this.enhancementError = `Error: ${error.message}`;
                        throw error;
                    }
                },
                
                async isPortrait(imageFile) {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => {
                            // Consider an image a portrait if it's taller than it is wide
                            // and has reasonable portrait dimensions
                            const isPortraitRatio = img.height > img.width;
                            const hasPortraitDimensions = img.height / img.width > 1.2;
                            
                            resolve(isPortraitRatio && hasPortraitDimensions);
                            URL.revokeObjectURL(img.src);
                        };
                        img.onerror = () => {
                            resolve(false);
                            URL.revokeObjectURL(img.src);
                        };
                        img.src = URL.createObjectURL(imageFile);
                    });
                },
                
                // Toggle use of enhanced images in the final post
                toggleEnhancedImages() {
                    this.useEnhancedImages = !this.useEnhancedImages;
                },
                
                // Check if an image has an enhanced version
                hasEnhancedVersion(file) {
                    return file.type.includes('image') && this.enhancedImages[file.name] !== undefined;
                },
                
                // Get the enhanced version of an image if it exists
                getEnhancedVersion(file) {
                    if (this.hasEnhancedVersion(file) && this.useEnhancedImages) {
                        return this.enhancedImages[file.name];
                    }
                    return file;
                },
                
                // Update the preview URLs when use of enhanced images changes
                updatePostMediaUrls() {
                    this.postMediaUrls = this.selectedFiles.map(file => {
                        const fileToUse = this.hasEnhancedVersion(file) && this.useEnhancedImages 
                            ? this.enhancedImages[file.name] 
                            : file;
                        
                        return {
                            src: URL.createObjectURL(fileToUse),
                            type: fileToUse.type,
                            file: fileToUse,
                            isEnhanced: this.hasEnhancedVersion(file) && this.useEnhancedImages
                        };
                    });
                },
                
                // Handle comparison slider movement
                handleSliderMove(event) {
                    const container = event.currentTarget;
                    const rect = container.getBoundingClientRect();
                    const x = event.clientX - rect.left;
                    const percentage = (x / rect.width) * 100;
                    
                    // Limit to 5-95% range for better UX
                    this.enhancementSliderPosition = Math.max(5, Math.min(95, percentage));
                },
                
                // Show fullscreen image viewer
                viewImageFullscreen(file) {
                    this.fullscreenImage = file;
                    this.showFullscreen = true;
                },
                
                // Close fullscreen image viewer
                closeFullscreen() {
                    this.showFullscreen = false;
                    this.fullscreenImage = null;
                }
            }
        }
    </script>
